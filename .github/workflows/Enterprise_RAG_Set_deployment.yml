name: Deploy Python Function App
on:
  push:
    branches:
      - main
  #workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'func-openai-logic' # Set this to your actual app name
  PYTHON_VERSION: '3.11'                         # Match your Terraform config


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read   # Required to checkout the repo
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4
      
      # Mandatory Delay
      - name: Wait for 30 Seconds
        run: sleep 12m  # Simple shell command for delay

      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Install dependencies'
        run: |
          pushd './src/'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: './src/' # Points to the folder containing your code
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

